services:
  bus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bus
      POSTGRES_PASSWORD: bus
      POSTGRES_DB: bus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bus -d bus"]
      interval: 5s
      timeout: 5s
      retries: 5

  bus-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
